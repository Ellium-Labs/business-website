<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ellium Labs — Odoo ERP & Software Solutions</title>
  <meta name="description" content="Ellium Labs builds and implements Odoo ERP systems, custom software, and web solutions for businesses globally. Odoo-certified team, 13+ members." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:         #0B1F3A;
      --navy-mid:     #0e2646;
      --navy-card:    #102b4e;
      --teal:         #028090;
      --teal-light:   #02C39A;
      --teal-glow:    rgba(2,128,144,0.22);
      --teal2-glow:   rgba(2,195,154,0.18);
      --text:         #EEF3FA;
      --text-muted:   #8BA5C2;
      --text-dim:     #4a6580;
      --border:       rgba(255,255,255,0.07);
      --border-mid:   rgba(255,255,255,0.11);
      --border-teal:  rgba(2,128,144,0.30);
      --card:         rgba(14,38,70,0.7);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.65;
    }
    h1,h2,h3,h4 { font-family: 'Outfit', sans-serif; line-height: 1.15; }
    ::selection { background: var(--teal); color: #fff; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--navy); }
    ::-webkit-scrollbar-thumb { background: var(--teal); border-radius: 3px; }

    /* ── Animations ── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes pulse    { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(.65);} }
    @keyframes ticker   { 0%{transform:translateX(0);} 100%{transform:translateX(-50%);} }
    @keyframes float    { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
    @keyframes shimmer  { 0%{background-position:-200% center;} 100%{background-position:200% center;} }

    .reveal {
      opacity: 0; transform: translateY(32px);
      transition: opacity .65s ease, transform .65s ease;
    }
    .reveal.visible { opacity:1; transform:translateY(0); }
    .pop > * {
      opacity:0; transform:translateY(24px) scale(.97);
      transition: opacity .5s cubic-bezier(.34,1.4,.64,1), transform .5s cubic-bezier(.34,1.4,.64,1);
    }
    .pop.visible > * { opacity:1; transform:none; }
    .pop.visible > *:nth-child(1){transition-delay:.00s}
    .pop.visible > *:nth-child(2){transition-delay:.07s}
    .pop.visible > *:nth-child(3){transition-delay:.14s}
    .pop.visible > *:nth-child(4){transition-delay:.21s}
    .pop.visible > *:nth-child(5){transition-delay:.28s}
    .pop.visible > *:nth-child(6){transition-delay:.35s}
    .pop.visible > *:nth-child(7){transition-delay:.42s}
    .pop.visible > *:nth-child(8){transition-delay:.49s}

    /* ── Utilities ── */
    .chip {
      display:inline-flex; align-items:center; gap:7px;
      font-family:'Outfit',sans-serif; font-size:11px; font-weight:600;
      letter-spacing:.11em; text-transform:uppercase;
      color:var(--teal-light); background:rgba(2,195,154,.08);
      border:1px solid rgba(2,195,154,.22); padding:5px 13px; border-radius:100px;
    }
    .chip::before { content:''; width:5px; height:5px; border-radius:50%; background:var(--teal-light); animation:pulse 2s infinite; }
    .g-text {
      background:linear-gradient(130deg,var(--teal) 0%,var(--teal-light) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    section { padding:96px 5%; }
    .wrap { max-width:1160px; margin:0 auto; }
    .sec-hd { text-align:center; margin-bottom:60px; }
    .sec-hd h2 { font-size:clamp(28px,3.6vw,48px); font-weight:700; letter-spacing:-.03em; margin-top:14px; }
    .sec-hd p  { color:var(--text-muted); font-size:16px; max-width:500px; margin:14px auto 0; line-height:1.75; }

    /* ── NAV ── */
    nav {
      position:fixed; top:0; left:0; right:0; z-index:1000;
      padding:0 5%; height:68px;
      display:flex; align-items:center; justify-content:space-between;
      transition:background .35s, border-color .35s;
      border-bottom:1px solid transparent;
    }
    nav.scrolled {
      background:rgba(11,31,58,.90); backdrop-filter:blur(18px) saturate(160%);
      border-color:var(--border);
    }
    .nav-logo img { height:36px; display:block; border-radius:6px; }
    .nav-links { display:flex; gap:30px; list-style:none; }
    .nav-links a { color:var(--text-muted); text-decoration:none; font-size:14px; font-weight:400; transition:color .2s; }
    .nav-links a:hover { color:var(--text); }
    .nav-cta {
      background:var(--teal); color:#fff; border:none;
      padding:9px 20px; border-radius:8px; cursor:pointer;
      font-family:'Outfit',sans-serif; font-weight:600; font-size:14px;
      transition:background .2s, transform .2s, box-shadow .2s;
      box-shadow:0 0 18px var(--teal-glow);
    }
    .nav-cta:hover { background:#029aae; transform:translateY(-1px); box-shadow:0 4px 24px var(--teal-glow); }
    .mob-btn {
      display:none; background:none; border:1px solid var(--border-mid);
      color:var(--text); padding:7px 11px; border-radius:7px; cursor:pointer; font-size:17px;
    }

    /* ── HERO ── */
    #hero {
      position:relative; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden; padding:130px 5% 80px;
    }
    #hero-canvas {
      position:absolute; inset:0; width:100%; height:100%;
      pointer-events:none; z-index:0;
    }
    .hero-grid {
      position:absolute; inset:0; z-index:1;
      background-image:
        linear-gradient(rgba(2,128,144,.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(2,128,144,.04) 1px,transparent 1px);
      background-size:54px 54px;
      mask-image:radial-gradient(ellipse 75% 80% at 50% 45%,black 0%,transparent 80%);
    }
    .hero-glow {
      position:absolute; z-index:1; border-radius:50%;
      filter:blur(110px); pointer-events:none;
    }
    .hero-glow-1 { width:520px; height:520px; top:-80px; left:-80px; background:rgba(2,128,144,.12); }
    .hero-glow-2 { width:420px; height:420px; bottom:-60px; right:-60px; background:rgba(2,195,154,.09); }
    .hero-inner { position:relative; z-index:2; text-align:center; max-width:840px; }
    .hero-h1 {
      font-size:clamp(38px,5.5vw,72px); font-weight:800;
      letter-spacing:-.035em; line-height:1.06;
      margin:22px 0 20px; text-wrap:balance;
      animation:fadeUp .9s .1s ease both;
    }
    .hero-sub {
      font-size:clamp(15px,1.7vw,18px); color:var(--text-muted);
      max-width:540px; margin:0 auto 36px; font-weight:300; line-height:1.75;
      animation:fadeUp .9s .25s ease both;
    }
    .hero-actions {
      display:flex; gap:12px; justify-content:center; flex-wrap:wrap;
      animation:fadeUp .9s .38s ease both;
    }
    .btn-primary {
      padding:13px 28px; border-radius:9px; border:none;
      background:var(--teal); color:#fff;
      font-family:'Outfit',sans-serif; font-weight:600; font-size:15px;
      cursor:pointer; transition:all .25s;
      box-shadow:0 4px 26px var(--teal-glow);
      display:inline-flex; align-items:center; gap:8px;
    }
    .btn-primary:hover { background:#029aae; transform:translateY(-2px); box-shadow:0 8px 36px var(--teal-glow); }
    .btn-outline {
      padding:13px 28px; border-radius:9px;
      border:1px solid var(--border-mid); background:transparent; color:var(--text);
      font-family:'Outfit',sans-serif; font-weight:600; font-size:15px;
      cursor:pointer; transition:all .25s;
    }
    .btn-outline:hover { background:rgba(255,255,255,.05); border-color:var(--border-teal); transform:translateY(-2px); }

    .hero-stats {
      display:flex; justify-content:center;
      margin-top:56px; padding-top:36px; border-top:1px solid var(--border);
      animation:fadeUp .9s .52s ease both;
    }
    .hst {
      flex:1; max-width:170px; text-align:center;
      padding:0 18px; border-right:1px solid var(--border);
    }
    .hst:last-child { border-right:none; }
    .hst-n {
      font-family:'Outfit',sans-serif; font-size:28px; font-weight:700;
      background:linear-gradient(135deg,var(--teal),var(--teal-light));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .hst-l { font-size:12px; color:var(--text-muted); margin-top:3px; line-height:1.4; }

    /* ── TICKER ── */
    .ticker-wrap {
      background:rgba(2,128,144,.06); border-top:1px solid var(--border);
      border-bottom:1px solid var(--border); overflow:hidden; padding:13px 0;
    }
    .ticker-track { display:flex; animation:ticker 30s linear infinite; width:max-content; }
    .ticker-track:hover { animation-play-state:paused; }
    .ticker-item {
      display:flex; align-items:center; gap:9px;
      padding:0 32px; font-size:12.5px; color:var(--text-muted);
      font-family:'Outfit',sans-serif; font-weight:500; white-space:nowrap;
    }
    .ticker-dot { width:4px; height:4px; border-radius:50%; background:var(--teal); flex-shrink:0; }

    /* ── ABOUT ── */
    #about { background:var(--navy-mid); }
    .about-grid { display:grid; grid-template-columns:1fr 1fr; gap:72px; align-items:center; }
    .about-vis {
      border-radius:18px; background:var(--card); border:1px solid var(--border);
      padding:32px; display:flex; flex-direction:column; gap:14px;
    }
    .a-stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .a-stat {
      background:rgba(2,128,144,.07); border:1px solid rgba(2,128,144,.18);
      border-radius:11px; padding:18px 16px;
    }
    .a-stat-n {
      font-family:'Outfit',sans-serif; font-size:26px; font-weight:700;
      background:linear-gradient(130deg,var(--teal),var(--teal-light));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .a-stat-l { font-size:11.5px; color:var(--text-muted); margin-top:2px; }
    .cert-row {
      padding:14px 16px; border-radius:10px;
      background:rgba(2,195,154,.05); border:1px solid rgba(2,195,154,.18);
    }
    .cert-lbl { font-size:10.5px; color:var(--teal-light); font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }
    .cert-pills { display:flex; flex-wrap:wrap; gap:6px; }
    .cert-pill {
      padding:3px 9px; border-radius:5px; font-size:11px; font-weight:600;
      background:rgba(2,195,154,.1); border:1px solid rgba(2,195,154,.22); color:var(--teal-light);
      font-family:'Outfit',sans-serif;
    }
    .about-txt h2 { font-size:clamp(24px,2.8vw,40px); font-weight:700; letter-spacing:-.03em; margin-top:14px; }
    .about-txt p { color:var(--text-muted); margin-top:14px; font-size:15px; line-height:1.8; }
    .about-pills { display:flex; flex-wrap:wrap; gap:8px; margin-top:22px; }
    .pill {
      padding:6px 14px; border-radius:100px; font-size:12.5px; font-weight:500;
      border:1px solid var(--border-mid); color:var(--text-muted); background:rgba(255,255,255,.03);
      transition:border-color .2s, color .2s;
    }
    .pill:hover { border-color:var(--border-teal); color:var(--text); }

    /* ── SERVICES ── */
    #services { background:var(--navy); }
    .svc-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
    .svc-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:14px; padding:28px 24px; position:relative; overflow:hidden;
      transition:transform .3s, border-color .3s, box-shadow .3s; cursor:default;
    }
    .svc-card::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(2,128,144,.06),transparent 60%);
      opacity:0; transition:opacity .3s; border-radius:14px;
    }
    .svc-card:hover { transform:translateY(-5px); border-color:var(--border-teal); box-shadow:0 12px 36px rgba(2,128,144,.10); }
    .svc-card:hover::after { opacity:1; }
    .svc-card:hover .svc-ico { transform:scale(1.08); }
    .svc-ico {
      width:44px; height:44px; border-radius:11px;
      background:rgba(2,128,144,.12); border:1px solid rgba(2,128,144,.24);
      display:flex; align-items:center; justify-content:center;
      font-size:19px; margin-bottom:16px; transition:transform .3s;
    }
    .svc-card h3 { font-size:16px; font-weight:600; margin-bottom:8px; }
    .svc-card p  { color:var(--text-muted); font-size:13.5px; line-height:1.75; }
    .svc-n { position:absolute; top:16px; right:18px; font-family:'Outfit',sans-serif; font-size:10px; font-weight:700; color:var(--text-dim); letter-spacing:.08em; }

    /* ── WHY ── */
    #why { background:var(--navy-mid); }
    .why-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
    .why-card {
      padding:26px 22px; border-radius:14px;
      border:1px solid var(--border); background:var(--card);
      transition:transform .3s, border-color .3s;
    }
    .why-card:hover { transform:translateY(-4px); border-color:var(--border-teal); }
    .why-ico {
      width:44px; height:44px; border-radius:50%;
      background:linear-gradient(135deg,rgba(2,128,144,.14),rgba(2,195,154,.07));
      border:1px solid rgba(2,128,144,.22);
      display:flex; align-items:center; justify-content:center;
      font-size:19px; margin-bottom:16px;
    }
    .why-card h3 { font-size:15.5px; font-weight:600; margin-bottom:7px; }
    .why-card p  { color:var(--text-muted); font-size:13.5px; line-height:1.7; }

    /* ── CASES ── */
    #cases { background:var(--navy); }
    .cases-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
    .case-card {
      border-radius:14px; overflow:hidden;
      border:1px solid var(--border); background:var(--card);
      transition:transform .3s, border-color .3s; display:flex; flex-direction:column;
    }
    .case-card:hover { transform:translateY(-5px); border-color:var(--border-teal); }
    .case-thumb {
      height:172px; position:relative;
      background:var(--navy-card);
      display:flex; align-items:center; justify-content:center;
    }
    .case-thumb-bg {
      width:100%; height:100%;
      background:repeating-linear-gradient(-45deg,transparent,transparent 10px,rgba(2,128,144,.04) 10px,rgba(2,128,144,.04) 20px);
      display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px;
    }
    .case-thumb-txt {
      font-size:10px; color:var(--text-dim); letter-spacing:.1em; text-transform:uppercase;
      font-family:'Outfit',sans-serif; text-align:center; padding:0 18px; line-height:1.6;
    }
    .case-tag {
      position:absolute; top:12px; left:12px;
      font-size:10px; font-weight:700; letter-spacing:.09em; text-transform:uppercase;
      padding:3px 9px; border-radius:5px;
      background:rgba(2,128,144,.22); border:1px solid rgba(2,128,144,.4);
      color:var(--teal-light); font-family:'Outfit',sans-serif;
    }
    .case-body { padding:20px 20px 24px; flex:1; display:flex; flex-direction:column; }
    .case-title { font-size:16px; font-weight:600; margin-bottom:6px; }
    .case-loc { font-size:11px; color:var(--text-dim); margin-bottom:10px; font-family:'Outfit',sans-serif; font-weight:600; letter-spacing:.05em; text-transform:uppercase; }
    .case-desc { font-size:13.5px; color:var(--text-muted); line-height:1.7; flex:1; }
    .case-mods { display:flex; flex-wrap:wrap; gap:5px; margin-top:14px; }
    .case-mod {
      font-size:11px; padding:3px 8px; border-radius:5px;
      background:rgba(255,255,255,.04); border:1px solid var(--border);
      color:var(--text-muted); font-family:'Outfit',sans-serif; font-weight:500;
    }
    .case-result {
      margin-top:13px; padding:9px 12px; border-radius:7px;
      background:rgba(2,195,154,.06); border:1px solid rgba(2,195,154,.18);
      font-size:12px; color:var(--teal-light); font-weight:500;
      display:flex; align-items:center; gap:7px;
    }
    .case-result::before { content:'✓'; font-weight:700; }

    /* ── TEAM ── */
    #team { background:var(--navy-mid); }
    .team-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:22px; }
    .team-card {
      padding:30px 24px; border-radius:14px;
      border:1px solid var(--border); background:var(--card); text-align:center;
      transition:transform .3s, border-color .3s;
    }
    .team-card:hover { transform:translateY(-4px); border-color:var(--border-teal); }
    .team-av {
      width:68px; height:68px; border-radius:50%; margin:0 auto 16px;
      background:linear-gradient(135deg,var(--teal),var(--teal-light));
      display:flex; align-items:center; justify-content:center;
      font-family:'Outfit',sans-serif; font-size:22px; font-weight:700; color:#fff;
      border:2px solid rgba(2,195,154,.28);
    }
    .team-name { font-size:16px; font-weight:700; margin-bottom:3px; }
    .team-role { font-size:11px; color:var(--teal-light); font-weight:600; letter-spacing:.06em; text-transform:uppercase; margin-bottom:12px; }
    .team-bio  { font-size:13.5px; color:var(--text-muted); line-height:1.7; }
    .team-creds { display:flex; flex-wrap:wrap; gap:5px; margin-top:14px; justify-content:center; }
    .team-cred {
      font-size:11px; padding:3px 8px; border-radius:5px;
      background:rgba(2,128,144,.09); border:1px solid rgba(2,128,144,.2);
      color:var(--text-muted); font-family:'Outfit',sans-serif; font-weight:500;
    }

    /* ── PARTNER SECTION ── */
    #partners {
      background:linear-gradient(160deg, #061628 0%, #0a2240 50%, #061e38 100%);
      position:relative; overflow:hidden;
    }
    #partners::before {
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 50%, rgba(2,128,144,.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 20% 50%, rgba(2,195,154,.07) 0%, transparent 60%);
      pointer-events:none;
    }
    #partners .wrap { position:relative; z-index:1; }
    .partner-grid { display:grid; grid-template-columns:1fr 1fr; gap:72px; align-items:center; }
    .partner-left h2 { font-size:clamp(26px,3.2vw,44px); font-weight:700; letter-spacing:-.03em; margin-top:14px; line-height:1.1; }
    .partner-left p  { color:var(--text-muted); font-size:15px; margin-top:16px; line-height:1.8; }
    .partner-quote {
      margin-top:28px; padding:20px 22px 20px 22px;
      border-radius:12px; border-left:3px solid var(--teal-light);
      background:rgba(2,195,154,.06);
    }
    .partner-quote p { font-size:15px; font-style:italic; color:var(--text); margin:0; font-weight:500; line-height:1.7; }
    .partner-actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:32px; }

    .partner-right { display:flex; flex-direction:column; gap:14px; }
    .p-feat {
      display:flex; gap:16px; align-items:flex-start;
      padding:18px 20px; border-radius:12px;
      border:1px solid var(--border); background:rgba(14,38,70,.5);
      transition:border-color .25s, transform .25s;
    }
    .p-feat:hover { border-color:var(--border-teal); transform:translateX(4px); }
    .p-feat-ico {
      width:40px; height:40px; border-radius:10px; flex-shrink:0;
      background:rgba(2,128,144,.12); border:1px solid rgba(2,128,144,.22);
      display:flex; align-items:center; justify-content:center; font-size:17px;
    }
    .p-feat-txt h4 { font-size:14px; font-weight:600; margin-bottom:3px; }
    .p-feat-txt p  { font-size:13px; color:var(--text-muted); line-height:1.6; }
    .partner-logos {

<script type="text/babel">

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />

  );

/* ── THREE.JS HERO CANVAS ───────────────────────────────────────────────── */
function HeroCanvas() {
  const canvasRef = React.useRef(null);
  useEffect(() => {
    if (!window.THREE) return;
    const canvas = canvasRef.current;
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(canvas.offsetWidth, canvas.offsetHeight);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, canvas.offsetWidth / canvas.offsetHeight, 0.1, 100);
    camera.position.z = 6;

    // Particles
    const geo = new THREE.BufferGeometry();
    const count = 130;
    const pos = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      pos[i*3]   = (Math.random() - 0.5) * 14;
      pos[i*3+1] = (Math.random() - 0.5) * 8;
      pos[i*3+2] = (Math.random() - 0.5) * 6;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const pMat = new THREE.PointsMaterial({ color: 0x02C39A, size: 0.045, transparent: true, opacity: 0.55 });
    const particles = new THREE.Points(geo, pMat);
    scene.add(particles);

    // Wireframe shapes
    const shapes = [];
    const mats = [0x028090, 0x02C39A, 0x4a9eff];
    [
      new THREE.IcosahedronGeometry(0.42, 0),
      new THREE.OctahedronGeometry(0.48, 0),
      new THREE.TetrahedronGeometry(0.40, 0),
      new THREE.IcosahedronGeometry(0.32, 1),
      new THREE.OctahedronGeometry(0.36, 0),
    ].forEach((g, i) => {
      const mat = new THREE.MeshBasicMaterial({ color: mats[i % mats.length], wireframe: true, transparent: true, opacity: 0.18 });
      const mesh = new THREE.Mesh(g, mat);
      mesh.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*5, (Math.random()-0.5)*3-1);
      mesh.userData = { spd: 0.002 + Math.random()*0.003, phase: Math.random()*Math.PI*2 };
      scene.add(mesh); shapes.push(mesh);
    });

    // Lines
    const lGeo = new THREE.BufferGeometry();
    const lPos = new Float32Array(60 * 3);
    for (let i = 0; i < 60; i++) {
      lPos[i*3]   = (Math.random()-0.5)*14;
      lPos[i*3+1] = (Math.random()-0.5)*8;
      lPos[i*3+2] = (Math.random()-0.5)*4;
    }
    lGeo.setAttribute('position', new THREE.BufferAttribute(lPos, 3));
    scene.add(new THREE.Line(lGeo, new THREE.LineBasicMaterial({ color: 0x028090, transparent: true, opacity: 0.06 })));

    let mouse = { x: 0, y: 0 };
    const onMouse = e => { mouse.x = (e.clientX/window.innerWidth - 0.5)*2; mouse.y = -(e.clientY/window.innerHeight - 0.5)*2; };
    window.addEventListener('mousemove', onMouse);

    let raf, t = 0;
    const animate = () => {
      raf = requestAnimationFrame(animate); t += 0.005;
      particles.rotation.y = t * 0.04;
      particles.rotation.x = mouse.y * 0.07;
      camera.position.x += (mouse.x * 0.35 - camera.position.x) * 0.04;
      camera.position.y += (mouse.y * 0.18 - camera.position.y) * 0.04;
      shapes.forEach(s => {
        s.rotation.x += s.userData.spd;
        s.rotation.y += s.userData.spd * 0.7;
        s.position.y += Math.sin(t + s.userData.phase) * 0.002;
      });
      renderer.render(scene, camera);
    };
    animate();

    const onResize = () => {
      renderer.setSize(canvas.offsetWidth, canvas.offsetHeight);
      camera.aspect = canvas.offsetWidth / canvas.offsetHeight;
      camera.updateProjectionMatrix();
    };
    window.addEventListener('resize', onResize);
    return () => { cancelAnimationFrame(raf); window.removeEventListener('mousemove', onMouse); window.removeEventListener('resize', onResize); renderer.dispose(); };
  }, []);
  return <canvas ref={canvasRef} id="hero-canvas" />;
}

/* ── CONTACT ─────────────────────────────────────────────────────────────── */
function Contact({ tweaks }) {
  const [form, setForm] = useState({name:'',email:'',company:'',type:'',service:'',message:''});
  const [sent, setSent] = useState(false);
  const [sending, setSending] = useState(false);
  const [errors, setErrors] = useState({});

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = true;
    if (!form.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email = true;
    if (!form.message.trim()) e.message = true;
    return e;
  };
  const submit = async ev => {
    ev.preventDefault();
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setErrors({}); setSending(true);
    await new Promise(r => setTimeout(r, 1200));
    setSending(false); setSent(true);
  };
  const set = k => ev => { setForm(f=>({...f,[k]:ev.target.value})); setErrors(e=>({...e,[k]:false})); };
  const err = k => errors[k] ? {borderColor:'rgba(255,80,80,.7)',boxShadow:'0 0 0 3px rgba(255,80,80,.1)'} : {};

  return (
    <section id="contact">
      <div className="wrap">
        <div className="contact-grid pop">
          <div className="contact-left">
            <span className="chip">Get In Touch</span>
            <h2>Start a Conversation</h2>
            <p>Tell us about your project or business challenge. We'll review and respond within 24 hours with a clear plan of action.</p>
            <div className="cdetails">
              <div className="cdet">
                <div className="cdet-ico">✉</div>
                <div className="cdet-txt">
                  <strong>Email</strong>
                  <span><a href="mailto:elliumlabs@gmail.com">elliumlabs@gmail.com</a></span>
                </div>
              </div>
              <div className="cdet">
                <div className="cdet-ico">📍</div>
                <div className="cdet-txt"><strong>Location</strong><span>Dhaka, Bangladesh</span></div>
              </div>
              <div className="cdet">
                <div className="cdet-ico">🌐</div>
                <div className="cdet-txt"><strong>Clients We Serve</strong><span>US · UK · Australia · Canada · Singapore</span></div>
              </div>
              <div className="cdet">
                <div className="cdet-ico">⏱</div>
                <div className="cdet-txt"><strong>Response Time</strong><span>Within 24 hours</span></div>
              </div>
            </div>
            {tweaks.showCalendly && (
              <a href="https://calendly.com/elliumlabs/30min" target="_blank" rel="noopener noreferrer" className="cal-btn">
                <span style={{fontSize:'20px'}}>📅</span>
                <div>
                  <div style={{fontSize:'13px',fontWeight:'700'}}>Book a Discovery Call</div>
                  <div style={{fontSize:'11px',color:'var(--text-muted)',fontWeight:'400',marginTop:'1px'}}>30 min · No commitment</div>
                </div>
              </a>
            )}
          </div>
          <div>
            {sent ? (
              <div className="f-success">
                <div className="f-check">✓</div>
                <h3 style={{fontFamily:'Outfit',fontWeight:'700',fontSize:'20px',marginBottom:'8px'}}>Message Received</h3>
                <p style={{color:'var(--text-muted)',fontSize:'14px'}}>We'll get back to you within 24 hours.</p>
                <button className="btn-outline" style={{marginTop:'22px'}} onClick={() => { setSent(false); setForm({name:'',email:'',company:'',type:'',service:'',message:''}); }}>
                  Send Another
                </button>
              </div>
            ) : (
              <form onSubmit={submit} noValidate>
                <div className="frow">
                  <div className="fg">
                    <label>Your Name *</label>
                    <input type="text" placeholder="John Smith" value={form.name} onChange={set('name')} style={err('name')} />
                  </div>
                  <div className="fg">
                    <label>Work Email *</label>
                    <input type="email" placeholder="you@company.com" value={form.email} onChange={set('email')} style={err('email')} />
                  </div>
                </div>
                <div className="frow">
                  <div className="fg">
                    <label>Company</label>
                    <input type="text" placeholder="Your company" value={form.company} onChange={set('company')} />
                  </div>
                  <div className="fg">
                    <label>I am a…</label>
                    <select value={form.type} onChange={set('type')}>
                      <option value="">Select…</option>
                      <option>Business needing Odoo ERP</option>
                      <option>Odoo consulting firm (partner)</option>
                      <option>Business needing custom software</option>
                      <option>Business needing a website</option>
                      <option>Other</option>
                    </select>
                  </div>
                </div>
                <div className="fg">
                  <label>Service Interested In</label>
                  <select value={form.service} onChange={set('service')}>
                    <option value="">Select…</option>
                    <option>Odoo Implementation (v16/v17/v18)</option>
                    <option>Custom Module Development</option>
                    <option>Migration & Upgrade</option>
                    <option>Web Development</option>
                    <option>BA / QA / PM Support</option>
                    <option>Post-Live Maintenance</option>
                    <option>White-Label Partnership</option>
                  </select>
                </div>
                <div className="fg">
                  <label>Tell us about your project *</label>
                  <textarea placeholder="Describe your project, goals, timeline, and any other details…" value={form.message} onChange={set('message')} style={err('message')}></textarea>
                </div>
                <button className="f-submit" type="submit" disabled={sending}>
                  {sending ? 'Sending…' : 'Send Message →'}
                </button>
                <p style={{fontSize:'11px',color:'var(--text-dim)',textAlign:'center',marginTop:'8px'}}>
                  All conversations are confidential. We respond within 24 hours.
                </p>
              </form>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}

/* ── APP ─────────────────────────────────────────────────────────────────── */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    const els = document.querySelectorAll('.reveal, .pop');
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.08 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav />
      <Hero tweaks={tweaks} />
      <Ticker />
      <About />
      <div className="divider"></div>
      <Services />
      <div className="divider"></div>
      <Partners tweaks={tweaks} />
      <div className="divider"></div>
      <Why />
      <div className="divider"></div>
      <Cases />
      <div className="divider"></div>
      <Team />
      <CtaBand />
      <CalendlyBanner />
      <Contact tweaks={tweaks} />
      <Footer />

      {/* Floating Calendly button */}
      <a href="https://calendly.com/elliumlabs/30min" target="_blank" rel="noopener noreferrer" className="cal-float">
        <span className="cal-float-icon">📅</span>
        Book a Call
      </a>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Hero">
          <TweakText label="Hero line 3" value={tweaks.heroLine2} onChange={v => setTweak('heroLine2', v)} />
          <TweakToggle label="Show stats bar" value={tweaks.showStats} onChange={v => setTweak('showStats', v)} />
        </TweakSection>
        <TweakSection label="Partner Section">
          <TweakText label="Section title" value={tweaks.partnerSectionTitle} onChange={v => setTweak('partnerSectionTitle', v)} />
        </TweakSection>
        <TweakSection label="Contact">
          <TweakToggle label="Show Calendly button" value={tweaks.showCalendly} onChange={v => setTweak('showCalendly', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
