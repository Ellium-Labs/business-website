<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ellium Labs — Your Trusted Technology Partner</title>
  <meta name="description" content="Ellium Labs specializes in Odoo ERP solutions, software development, and IT consulting. Empowering businesses through intelligent technology." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #030b18;
      --bg-surface: #070f20;
      --bg-card:    #0b1529;
      --bg-card2:   #0f1c35;
      --accent:     oklch(62% 0.20 232);
      --accent2:    oklch(62% 0.18 188);
      --accent-glow: oklch(62% 0.20 232 / 0.35);
      --accent2-glow: oklch(62% 0.18 188 / 0.35);
      --text:       #e6eeff;
      --text-muted: #7a8daa;
      --text-dim:   #4a5c78;
      --border:     rgba(100,140,255,0.10);
      --border-bright: rgba(100,140,255,0.22);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.6;
    }

    h1,h2,h3,h4,h5 { font-family: 'Outfit', sans-serif; }

    ::selection { background: var(--accent); color: #fff; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    /* Canvas */
    #hero-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    /* Utility */
    .section-tag {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent);
      background: oklch(62% 0.20 232 / 0.10);
      border: 1px solid oklch(62% 0.20 232 / 0.25);
      padding: 6px 14px; border-radius: 100px;
    }
    .section-tag::before {
      content: ''; display: block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .reveal {
      opacity: 0; transform: translateY(40px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1; transform: translateY(0);
    }

    /* Pop-up child animations */
    .pop-children > * {
      opacity: 0;
      transform: translateY(36px) scale(0.96);
      transition: opacity 0.55s cubic-bezier(0.34,1.56,0.64,1),
                  transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
    }
    .pop-children.visible > * {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    /* stagger delays 1–12 */
    .pop-children.visible > *:nth-child(1)  { transition-delay: 0.00s; }
    .pop-children.visible > *:nth-child(2)  { transition-delay: 0.08s; }
    .pop-children.visible > *:nth-child(3)  { transition-delay: 0.16s; }
    .pop-children.visible > *:nth-child(4)  { transition-delay: 0.24s; }
    .pop-children.visible > *:nth-child(5)  { transition-delay: 0.32s; }
    .pop-children.visible > *:nth-child(6)  { transition-delay: 0.40s; }
    .pop-children.visible > *:nth-child(7)  { transition-delay: 0.48s; }
    .pop-children.visible > *:nth-child(8)  { transition-delay: 0.56s; }
    .pop-children.visible > *:nth-child(9)  { transition-delay: 0.64s; }
    .pop-children.visible > *:nth-child(10) { transition-delay: 0.72s; }
    .pop-children.visible > *:nth-child(11) { transition-delay: 0.80s; }
    .pop-children.visible > *:nth-child(12) { transition-delay: 0.88s; }

    /* slide-in from left / right for about section */
    .slide-left {
      opacity: 0; transform: translateX(-48px);
      transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1);
    }
    .slide-right {
      opacity: 0; transform: translateX(48px);
      transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1);
      transition-delay: 0.12s;
    }
    .slide-left.visible, .slide-right.visible {
      opacity: 1; transform: translateX(0);
    }

    /* count-up number flash */
    @keyframes countFlash {
      0% { opacity: 0; transform: translateY(12px) scale(0.8); }
      60% { opacity: 1; transform: translateY(-3px) scale(1.06); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .stat.popped .stat-num {
      animation: countFlash 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .stat.popped:nth-child(1) .stat-num { animation-delay: 0.00s; }
    .stat.popped:nth-child(2) .stat-num { animation-delay: 0.10s; }
    .stat.popped:nth-child(3) .stat-num { animation-delay: 0.20s; }
    .stat.popped:nth-child(4) .stat-num { animation-delay: 0.30s; }

    /* section header word-by-word */
    .section-header.reveal h2 .word {
      display: inline-block;
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.34,1.36,0.64,1);
    }
    .section-header.reveal.visible h2 .word { opacity: 1; transform: translateY(0); }
    .section-header.reveal.visible h2 .word:nth-child(1) { transition-delay: 0.05s; }
    .section-header.reveal.visible h2 .word:nth-child(2) { transition-delay: 0.12s; }
    .section-header.reveal.visible h2 .word:nth-child(3) { transition-delay: 0.19s; }
    .section-header.reveal.visible h2 .word:nth-child(4) { transition-delay: 0.26s; }
    .section-header.reveal.visible h2 .word:nth-child(5) { transition-delay: 0.33s; }
    .section-header.reveal.visible h2 .word:nth-child(6) { transition-delay: 0.40s; }
    .section-header.reveal.visible h2 .word:nth-child(7) { transition-delay: 0.47s; }
    .section-header.reveal.visible h2 .word:nth-child(8) { transition-delay: 0.54s; }
    .section-header.reveal.visible p {
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.5s ease 0.45s, transform 0.5s ease 0.45s;
    }
    .section-header.reveal.visible p { opacity: 1; transform: translateY(0); }

    /* pill pop */
    .about-pills.pop-children > * {
      transform: translateY(16px) scale(0.9);
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 0 5%;
      display: flex; align-items: center; justify-content: space-between;
      height: 72px;
      transition: background 0.4s, backdrop-filter 0.4s, border-color 0.4s;
      border-bottom: 1px solid transparent;
    }
    nav.scrolled {
      background: rgba(3,11,24,0.82);
      backdrop-filter: blur(20px) saturate(180%);
      border-color: var(--border);
    }
    .nav-logo {
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 22px;
      color: var(--text); text-decoration: none; letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 0px;
    }
    .nav-logo-icon { display: flex; align-items: center; }
    .nav-links {
      display: flex; gap: 36px; list-style: none;
    }
    .nav-links a {
      color: var(--text-muted); text-decoration: none; font-size: 14px;
      font-weight: 400; transition: color 0.2s; letter-spacing: 0.01em;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-cta {
      background: var(--accent); color: #fff;
      border: none; padding: 10px 22px; border-radius: 8px;
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 14px;
      cursor: pointer; transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .nav-cta:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 28px var(--accent-glow); }

    /* HERO */
    #hero {
      position: relative; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; padding: 120px 5% 80px;
    }
    .hero-grid-overlay {
      position: absolute; inset: 0; z-index: 1;
      background-image:
        linear-gradient(rgba(100,140,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100,140,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 80%);
    }
    .hero-glow {
      position: absolute; z-index: 1;
      border-radius: 50%; filter: blur(120px); pointer-events: none;
    }
    .hero-glow-1 {
      width: 600px; height: 600px; top: -100px; left: -100px;
      background: oklch(62% 0.20 232 / 0.12);
    }
    .hero-glow-2 {
      width: 500px; height: 500px; bottom: -50px; right: -50px;
      background: oklch(62% 0.18 188 / 0.10);
    }
    .hero-content {
      position: relative; z-index: 2; text-align: center; max-width: 860px;
    }
    .hero-badge {
      animation: fadeIn 0.6s ease both;
      margin-bottom: 28px; display: inline-block;
    }
    .hero-headline {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(42px, 6vw, 80px);
      font-weight: 800; line-height: 1.08; letter-spacing: -0.03em;
      margin-bottom: 24px;
      animation: fadeUp 0.8s 0.2s ease both;
    }
    .hero-headline .gradient-text {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, #a78bfa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: clamp(16px, 2vw, 20px); color: var(--text-muted);
      max-width: 580px; margin: 0 auto 40px; font-weight: 300;
      animation: fadeUp 0.8s 0.35s ease both;
    }
    .hero-actions {
      display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
      animation: fadeUp 0.8s 0.5s ease both;
    }
    .btn-primary {
      padding: 14px 32px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff;
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 15px;
      cursor: pointer; transition: all 0.25s;
      box-shadow: 0 4px 30px var(--accent-glow);
      display: flex; align-items: center; gap: 8px;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 40px var(--accent-glow); opacity: 0.9; }
    .btn-secondary {
      padding: 14px 32px; border-radius: 10px;
      border: 1px solid var(--border-bright); background: transparent; color: var(--text);
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 15px;
      cursor: pointer; transition: all 0.25s;
    }
    .btn-secondary:hover { background: rgba(100,140,255,0.08); border-color: oklch(62% 0.20 232 / 0.45); transform: translateY(-2px); }

    .hero-stats {
      display: flex; justify-content: center; gap: 48px; margin-top: 64px;
      animation: fadeUp 0.8s 0.65s ease both;
      padding-top: 40px; border-top: 1px solid var(--border);
    }
    .stat { text-align: center; }
    .stat-num {
      font-family: 'Outfit', sans-serif; font-size: 32px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    /* SECTIONS COMMON */
    section { padding: 100px 5%; }
    .section-inner { max-width: 1160px; margin: 0 auto; }
    .section-header { text-align: center; margin-bottom: 64px; }
    .section-header h2 {
      font-size: clamp(32px, 4vw, 52px); font-weight: 700;
      letter-spacing: -0.03em; margin-top: 16px; line-height: 1.15;
    }
    .section-header p {
      color: var(--text-muted); font-size: 16px; max-width: 520px;
      margin: 16px auto 0;
    }

    /* ABOUT */
    #about { background: var(--bg-surface); }
    .about-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 64px;
      align-items: center;
    }
    .about-visual {
      position: relative; border-radius: 20px; overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border);
      aspect-ratio: 1 / 1; max-width: 480px;
      display: flex; align-items: center; justify-content: center;
    }
    .about-3d-shape {
      width: 220px; height: 220px;
      background: linear-gradient(135deg, oklch(62% 0.20 232 / 0.15), oklch(62% 0.18 188 / 0.1));
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      animation: morph 8s ease-in-out infinite;
      border: 1px solid oklch(62% 0.20 232 / 0.2);
      box-shadow: inset 0 0 60px oklch(62% 0.20 232 / 0.1), 0 0 80px oklch(62% 0.20 232 / 0.1);
    }
    @keyframes morph {
      0%,100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
      25% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; }
      50% { border-radius: 50% 50% 30% 70% / 50% 70% 30% 50%; }
      75% { border-radius: 30% 70% 70% 30% / 70% 30% 70% 30%; }
    }
    .about-orb {
      position: absolute; border-radius: 50%; filter: blur(40px);
    }
    .about-text h2 {
      font-size: clamp(28px, 3vw, 44px); font-weight: 700; letter-spacing: -0.03em;
      line-height: 1.2; margin-top: 16px;
    }
    .about-text p { color: var(--text-muted); margin-top: 16px; font-size: 15px; line-height: 1.8; }
    .about-pills {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px;
    }
    .pill {
      padding: 7px 16px; border-radius: 100px; font-size: 13px;
      border: 1px solid var(--border-bright); color: var(--text-muted);
      background: var(--bg-card); font-weight: 500;
      transition: border-color 0.2s, color 0.2s;
    }
    .pill:hover { border-color: var(--accent); color: var(--text); }

    /* SERVICES */
    #services { background: var(--bg-deep); }
    .services-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    }
    .service-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 32px 28px;
      cursor: default;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      position: relative; overflow: hidden;
    }
    .service-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--accent-glow), transparent 70%);
      opacity: 0; transition: opacity 0.35s; border-radius: 16px;
    }
    .service-card:hover { transform: translateY(-6px); border-color: var(--border-bright); }
    .service-card:hover::before { opacity: 1; }
    .service-card:hover .service-icon-wrap { transform: scale(1.08); }
    .service-icon-wrap {
      width: 52px; height: 52px; border-radius: 14px;
      background: oklch(62% 0.20 232 / 0.12);
      border: 1px solid oklch(62% 0.20 232 / 0.2);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px; font-size: 22px;
      transition: transform 0.3s;
    }
    .service-card h3 { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
    .service-card p { color: var(--text-muted); font-size: 14px; line-height: 1.75; }
    .service-card .card-num {
      position: absolute; top: 20px; right: 24px;
      font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 700;
      color: var(--text-dim); letter-spacing: 0.08em;
    }

    /* WHY */
    #why { background: var(--bg-surface); }
    .why-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
    }
    .why-card {
      padding: 32px 24px; border-radius: 16px;
      border: 1px solid var(--border); background: var(--bg-card);
      text-align: center;
      transition: transform 0.3s, border-color 0.3s;
    }
    .why-card:hover { transform: translateY(-4px); border-color: var(--border-bright); }
    .why-icon {
      width: 60px; height: 60px; border-radius: 50%;
      background: linear-gradient(135deg, oklch(62% 0.20 232 / 0.15), oklch(62% 0.18 188 / 0.08));
      border: 1px solid var(--border-bright);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; margin: 0 auto 20px;
    }
    .why-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 10px; }
    .why-card p { color: var(--text-muted); font-size: 13px; line-height: 1.7; }

    /* PORTFOLIO */
    #portfolio { background: var(--bg-deep); }
    .portfolio-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    }
    .portfolio-card {
      border-radius: 16px; overflow: hidden;
      border: 1px solid var(--border); background: var(--bg-card);
      transition: transform 0.3s, border-color 0.3s;
      cursor: pointer;
    }
    .portfolio-card:hover { transform: translateY(-6px); border-color: var(--border-bright); }
    .portfolio-card:hover .portfolio-img-overlay { opacity: 1; }
    .portfolio-img {
      height: 200px; position: relative; overflow: hidden;
      background: var(--bg-card2);
      display: flex; align-items: center; justify-content: center;
    }
    .portfolio-img-overlay {
      position: absolute; inset: 0;
      background: oklch(62% 0.20 232 / 0.15);
      opacity: 0; transition: opacity 0.3s;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: var(--accent);
    }
    .portfolio-placeholder {
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        45deg,
        transparent, transparent 12px,
        rgba(100,140,255,0.04) 12px, rgba(100,140,255,0.04) 24px
      );
      display: flex; align-items: center; justify-content: center;
    }
    .portfolio-placeholder span {
      font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em;
      text-transform: uppercase; font-family: 'Outfit', sans-serif;
    }
    .portfolio-body { padding: 22px 22px 26px; }
    .portfolio-tag {
      font-size: 11px; color: var(--accent); font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px;
    }
    .portfolio-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .portfolio-card p { font-size: 13px; color: var(--text-muted); line-height: 1.65; }

    /* TAGLINES */
    #taglines { background: var(--bg-surface); }
    .tagline-list {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
      max-width: 860px; margin: 0 auto;
    }
    .tagline-item {
      padding: 22px 26px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--bg-card);
      display: flex; align-items: flex-start; gap: 14px;
      transition: border-color 0.3s, transform 0.25s;
    }
    .tagline-item:hover { border-color: var(--border-bright); transform: translateX(4px); }
    .tagline-num {
      font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 700;
      color: var(--accent); background: oklch(62% 0.20 232 / 0.1);
      border-radius: 6px; padding: 4px 8px; flex-shrink: 0; margin-top: 2px;
    }
    .tagline-item p { font-size: 15px; font-weight: 500; color: var(--text); }

    /* CONTACT */
    #contact { background: var(--bg-deep); }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
    .contact-info h2 {
      font-size: clamp(28px, 3vw, 44px); font-weight: 700;
      letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 16px;
    }
    .contact-info p { color: var(--text-muted); font-size: 15px; margin-bottom: 36px; }
    .contact-detail {
      display: flex; gap: 14px; margin-bottom: 20px; align-items: flex-start;
    }
    .contact-detail-icon {
      width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
      background: oklch(62% 0.20 232 / 0.10); border: 1px solid var(--border-bright);
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .contact-detail-text strong { font-size: 13px; color: var(--text-muted); font-weight: 400; display: block; margin-bottom: 2px; }

// ── THREE.JS HERO SCENE ──────────────────────────────────────────────────────
function HeroCanvas({ hue }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    if (!window.THREE) return;
    const canvas = canvasRef.current;
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(canvas.offsetWidth, canvas.offsetHeight);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, canvas.offsetWidth / canvas.offsetHeight, 0.1, 100);
    camera.position.z = 6;

    // Particles
    const geometry = new THREE.BufferGeometry();
    const count = 120;
    const positions = new Float32Array(count * 3);
    const scales = new Float32Array(count);
    for (let i = 0; i < count; i++) {
      positions[i * 3]     = (Math.random() - 0.5) * 14;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 8;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 6;
      scales[i] = Math.random();
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const pMat = new THREE.PointsMaterial({ color: 0x4488ff, size: 0.04, transparent: true, opacity: 0.6 });
    const particles = new THREE.Points(geometry, pMat);
    scene.add(particles);

    // Floating shapes
    const shapes = [];
    const shapeGeos = [
      new THREE.IcosahedronGeometry(0.4, 0),
      new THREE.OctahedronGeometry(0.45, 0),
      new THREE.TetrahedronGeometry(0.38, 0),
      new THREE.IcosahedronGeometry(0.3, 1),
      new THREE.OctahedronGeometry(0.35, 0),
    ];
    const mat = new THREE.MeshBasicMaterial({ color: 0x4488ff, wireframe: true, transparent: true, opacity: 0.22 });
    shapeGeos.forEach((geo, i) => {
      const mesh = new THREE.Mesh(geo, mat.clone());
      mesh.position.set(
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 5,
        (Math.random() - 0.5) * 3 - 1
      );
      mesh.userData = { speed: 0.002 + Math.random() * 0.003, phase: Math.random() * Math.PI * 2 };
      scene.add(mesh);
      shapes.push(mesh);
    });

    // Connecting lines
    const lineMat = new THREE.LineBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.07 });
    const lineGeo = new THREE.BufferGeometry();
    const linePos = new Float32Array(60 * 3);
    for (let i = 0; i < 60; i++) {
      linePos[i * 3]     = (Math.random() - 0.5) * 14;
      linePos[i * 3 + 1] = (Math.random() - 0.5) * 8;
      linePos[i * 3 + 2] = (Math.random() - 0.5) * 4;
    }
    lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
    const lines = new THREE.Line(lineGeo, lineMat);
    scene.add(lines);

    let mouse = { x: 0, y: 0 };
    const onMouse = (e) => {
      mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    };
    window.addEventListener('mousemove', onMouse);

    let raf;
    let t = 0;
    const animate = () => {
      raf = requestAnimationFrame(animate);
      t += 0.005;
      particles.rotation.y = t * 0.05;
      particles.rotation.x = mouse.y * 0.08;
      camera.position.x += (mouse.x * 0.4 - camera.position.x) * 0.04;
      camera.position.y += (mouse.y * 0.2 - camera.position.y) * 0.04;
      shapes.forEach((s) => {
        s.rotation.x += s.userData.speed;
        s.rotation.y += s.userData.speed * 0.7;
        s.position.y += Math.sin(t + s.userData.phase) * 0.002;
      });
      renderer.render(scene, camera);
    };
    animate();

    const onResize = () => {
      renderer.setSize(canvas.offsetWidth, canvas.offsetHeight);
      camera.aspect = canvas.offsetWidth / canvas.offsetHeight;
      camera.updateProjectionMatrix();
    };
    window.addEventListener('resize', onResize);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('mousemove', onMouse);
      window.removeEventListener('resize', onResize);
      renderer.dispose();
    };
  }, []);

  return React.createElement('canvas', { ref: canvasRef, id: 'hero-canvas' });
}

// ── CONTACT ───────────────────────────────────────────────────────────────────
function Contact() {
  const [form, setForm] = useState({ name: '', email: '', company: '', service: '', message: '' });
  const [sent, setSent] = useState(false);
  const [sending, setSending] = useState(false);
  const [errors, setErrors] = useState({});

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = true;
    if (!form.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email = true;
    if (!form.message.trim()) e.message = true;
    return e;
  };

  const handleSubmit = async (ev) => {
    ev.preventDefault();
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setErrors({});
    setSending(true);
    await new Promise(r => setTimeout(r, 1400));
    setSending(false);
    setSent(true);
  };

  const set = (k) => (ev) => { setForm(f => ({...f, [k]: ev.target.value})); setErrors(e => ({...e, [k]: false})); };

  const inputStyle = (k) => errors[k] ? {borderColor:'oklch(62% 0.18 15 / 0.8)',boxShadow:'0 0 0 3px oklch(62% 0.18 15 / 0.15)'} : {};

  return (
    <section id="contact">

        <div className="section-header reveal">

              <div className="contact-detail-icon">✉</div>
              <div className="contact-detail-text">
                <strong>Email</strong>
                <span>hello@elliumlabs.com</span>
              </div>
            </div>
            <div className="contact-detail">
              <div className="contact-detail-icon">☎</div>
              <div className="contact-detail-text">
                <strong>Phone</strong>
                <span>+1 (555) 000-0000</span>
              </div>
            </div>
            <div className="contact-detail">
              <div className="contact-detail-icon">◎</div>
              <div className="contact-detail-text">
                <strong>Office</strong>
                <span>123 Tech Avenue, Suite 400<br/>San Francisco, CA 94105</span>
              </div>
            </div>
            <div className="contact-detail">
              <div className="contact-detail-icon">◷</div>
              <div className="contact-detail-text">
                <strong>Business Hours</strong>
                <span>Mon–Fri, 9:00 AM – 6:00 PM PST</span>
              </div>
            </div>
            <div style={{marginTop:'32px',padding:'24px',borderRadius:'14px',border:'1px solid var(--border)',background:'var(--bg-card)'}}>
              <div style={{fontSize:'13px',color:'var(--text-muted)',marginBottom:'10px',fontWeight:'500'}}>Response Time</div>
              <div style={{fontSize:'28px',fontFamily:'Outfit',fontWeight:'700',background:'linear-gradient(135deg,var(--accent),var(--accent2))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>{"< 24 hours"}</div>
              <div style={{fontSize:'13px',color:'var(--text-muted)',marginTop:'6px'}}>We take every inquiry seriously.</div>
            </div>
          </div>
          <div>
            {sent ? (
              <div className="form-success">
                <div className="check">✓</div>
                <h3>Message Received</h3>
                <p>Thank you for reaching out. We'll review your message and be in touch within 24 hours.</p>
                <button className="btn-secondary" style={{marginTop:'24px',display:'inline-block'}} onClick={() => { setSent(false); setForm({ name:'', email:'', company:'', service:'', message:'' }); }}>Send Another</button>
              </div>
            ) : (
              <form onSubmit={handleSubmit} noValidate>
                <div className="form-row">
                  <div className="form-group">
                    <label>Your Name *</label>
                    <input type="text" placeholder="John Smith" value={form.name} onChange={set('name')} style={inputStyle('name')} />
                  </div>
                  <div className="form-group">
                    <label>Email Address *</label>
                    <input type="email" placeholder="john@company.com" value={form.email} onChange={set('email')} style={inputStyle('email')} />
                  </div>
                </div>
                <div className="form-row">
                  <div className="form-group">
                    <label>Company</label>
                    <input type="text" placeholder="Your Company" value={form.company} onChange={set('company')} />
                  </div>
                  <div className="form-group">
                    <label>Service Interested In</label>
                    <select value={form.service} onChange={set('service')}>
                      <option value="">Select a service…</option>
                      <option>Odoo ERP Implementation</option>
                      <option>Odoo Customization & Integration</option>
                      <option>Business Process Automation</option>
                      <option>Web & Software Development</option>
                      <option>IT Consulting & Support</option>
                      <option>Other</option>
                    </select>
                  </div>
                </div>
                <div className="form-group">
                  <label>How can we help? *</label>
                  <textarea placeholder="Tell us about your project, goals, and timeline…" value={form.message} onChange={set('message')} style={inputStyle('message')}></textarea>
                </div>
                <button className="form-submit" type="submit" disabled={sending}>
                  {sending ? 'Sending…' : 'Send Message →'}

              </form>
            )}

        </div>

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Reveal + pop on scroll
  useEffect(() => {
    const selectors = '.reveal, .pop-children, .slide-left, .slide-right';
    const els = document.querySelectorAll(selectors);
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          // stat number flash
          if (e.target.classList.contains('hero-stats')) {
            e.target.querySelectorAll('.stat').forEach(s => s.classList.add('popped'));
          }
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.10 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  // Apply accent hue custom property
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', `oklch(62% 0.20 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--accent2', `oklch(62% 0.18 ${tweaks.accentHue2})`);
    document.documentElement.style.setProperty('--accent-glow', `oklch(62% 0.20 ${tweaks.accentHue} / 0.35)`);
    document.documentElement.style.setProperty('--accent2-glow', `oklch(62% 0.18 ${tweaks.accentHue2} / 0.35)`);
  }, [tweaks.accentHue, tweaks.accentHue2]);

  return (
    <>
      <Nav tweaks={tweaks} setTweak={setTweak} />
      <Hero tweaks={tweaks} />
      <div className="section-divider"></div>
      <About />
      <div className="section-divider"></div>
      <Services />
      <div className="section-divider"></div>
      <Why />
      <div className="section-divider"></div>
      <Portfolio />
      <div className="section-divider"></div>
      <Taglines />
      <div className="section-divider"></div>
      <Contact />
      <Footer />
      <TweaksPanel>
        <TweakSection title="Brand">
          <TweakColor label="Accent Color" k="accentHue" tweaks={tweaks} setTweak={setTweak} isHue={true} min={0} max={360} />
          <TweakColor label="Secondary Accent" k="accentHue2" tweaks={tweaks} setTweak={setTweak} isHue={true} min={0} max={360} />
        </TweakSection>
        <TweakSection title="Hero">
          <TweakText label="Headline" k="heroHeadline" tweaks={tweaks} setTweak={setTweak} />
          <TweakText label="Tagline" k="tagline" tweaks={tweaks} setTweak={setTweak} />
          <TweakToggle label="Show Stats Bar" k="showStats" tweaks={tweaks} setTweak={setTweak} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

// Custom color hue slider as tweak control
function TweakColor({ label, k, tweaks, setTweak, isHue, min, max }) {
  return (
    <TweakSlider label={label} k={k} tweaks={tweaks} setTweak={setTweak} min={min || 0} max={max || 360} step={1} />
  );
}
